# Collabryx — Render Blueprint (Free Tier)
# Deploy via Render Dashboard → New → Blueprint → Connect Repo
#
# Architecture:
#   - Vercel (free):      Next.js frontend
#   - HF Spaces (free):   Embedding service (Sentence Transformers)
#   - Supabase (free):    PostgreSQL database
#   - Render (3 free):    Notification, Feed, Match microservices
#
# ── Manual setup required ──────────────────────────────────────────
# Variables with `sync: false` must be set in the Render Dashboard:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (for each service)
# These are NOT populated by the Blueprint and will cause 502 errors
# if left empty. Set them via Dashboard → Environment → Secret Files.
# ───────────────────────────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────
  # 1. Notification Service (lightweight)
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-notification-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./deploy/render/notification-service.Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app

  # ─────────────────────────────────────────────
  # 2. Feed Scoring Service (Thompson Sampling)
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-feed-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./deploy/render/feed-service.Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app

  # ─────────────────────────────────────────────
  # 3. Match Generation Service
  # ─────────────────────────────────────────────
  - type: web
    name: collabryx-match-service
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./deploy/render/match-service.Dockerfile
    rootDir: .
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://collabryx.vercel.app
